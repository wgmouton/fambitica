services:
  # server:
  #   image: ""
  #   depends_on:
  #     - mongo
  #   environment:
  #     - NODE_DB_URI=mongodb://mongo/habitica # this only needs to be adapted if using a separate database
  #     - BASE_URL=http://127.0.0.1:8080 # change this to the URL under which your instance will be reachable
  #     - INVITE_ONLY=false # change to `true` after registration of initial users, to restrict further registrations
  #   networks:
  #     - habitica
  #   ports:
  #     - "3000:3000"
  server:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: server
      platforms:
        - "linux/amd64"
    depends_on:
      - mongo
    environment:
      - NODE_DB_URI=mongodb://mongo:27017/habitica # this only needs to be adapted if using a separate database
      - BASE_URL=http://localhost:8080 # change this to the URL under which your instance will be reachable
      - BASIC_AUTH_LOGIN_ENABLED=true
      - S3_ENDPOINT=http://127.0.0.1:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=habitica
      - S3_PUBLIC_BASE_URL=http://127.0.0.1:9000/habitica
      - S3_FORCE_PATH_STYLE=true
      - S3_TASKS_PREFIX=task-images/
      - INVITE_ONLY=false # change to `true` after registration of initial users, to restrict further registrations
    networks:
      - habitica
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.habitica.rule=Host(`localhost`)"
      - "traefik.http.routers.habitica.entrypoints=web"
      - "traefik.http.routers.habitica.middlewares=habitica-basic@docker"
      - "traefik.http.services.habitica.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.habitica-basic.headers.customRequestHeaders.Authorization=Basic dGVzdDpxd2VydDEyMzQ1"
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8080"
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - habitica
  mongo:
    image: mongo:latest
    # image: docker.io/mongo:latest
    restart: unless-stopped
    hostname: mongo
    # command: ["--replSet", "rs", "--bind_ip_all", "--port", "27017"]
    command: ["--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb-data/db:/data/db:rw,Z
      - ./mongodb-data/dbconf:/data/configdb:Z
    networks:
      habitica:
        aliases:
          - mongo
  mongo_express:
    depends_on:
      - mongo
    image: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongo/habitica"
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    networks:
      habitica:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    networks:
      - habitica
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 minioadmin minioadmin &&
      printf '{\"CORSRules\":[{\"AllowedOrigins\":[\"http://localhost:8080\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"],\"MaxAgeSeconds\":3000}]}' > /tmp/cors.json &&
      /usr/bin/mc mb -p minio/habitica || true &&
      /usr/bin/mc anonymous set public minio/habitica || true &&
      /usr/bin/mc cors set minio/habitica /tmp/cors.json || true
      "
    networks:
      - habitica
networks:
  habitica:
    driver: bridge
